<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Orders</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <button onclick="loadOrders()">Refresh Orders</button>
        <button onclick="clearOrders()">Clear All Orders</button>
    </header>

    <section id="orders-list" style="padding: 20px;">
        <!-- Orders will be loaded here -->
    </section>

    <script>
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const container = document.getElementById('orders-list');
            container.innerHTML = '<h2>Recent Orders</h2>';

            if (orders.length === 0) {
                container.innerHTML += '<p>No orders yet.</p>';
                return;
            }

            orders.forEach((order, index) => {
                const div = document.createElement('div');
                div.style.border = '1px solid #ddd';
                div.style.margin = '10px 0';
                div.style.padding = '15px';
                div.innerHTML = `
                    <h3>Order ${index + 1}: ${order.product.name}</h3>
                    <p><strong>Customer:</strong> ${order.customer.name} (${order.customer.mobile})</p>
                    <p><strong>Timestamp:</strong> ${new Date(order.timestamp).toLocaleString()}</p>
                    <p><strong>Location:</strong> 
                        ${order.location.latitude ? 
                            `<a href="https://www.google.com/maps?q=${order.location.latitude},${order.location.longitude}" target="_blank">View on Map</a>` : 
                            'Not available'}
                    </p>
                `;
                container.appendChild(div);
            });
        }

        function clearOrders() {
            if (confirm("Clear all orders?")) {
                localStorage.removeItem('orders');
                loadOrders();
            }
        }

        // Load on start
        window.onload = loadOrders;
    </script>
</body>
</html>
